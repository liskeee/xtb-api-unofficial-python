name: Release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      is_stable: ${{ steps.classify.outputs.is_stable }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="${INPUT_TAG:-$EVENT_TAG}"
          if [[ -z "$TAG" ]]; then
            echo "No tag resolved" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Validate metadata
        run: twine check dist/*
      - name: Classify tag
        id: classify
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: ${{ needs.build.outputs.is_stable == 'false' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/xtb-api-python
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: ${{ needs.build.outputs.is_stable == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/xtb-api-python
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  attach-assets:
    needs: [build, publish-pypi]
    if: ${{ needs.build.outputs.is_stable == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload build artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build.outputs.tag }}
        run: gh release upload "$TAG" dist/* --clobber

  attach-assets-prerelease:
    needs: [build, publish-testpypi]
    if: ${{ needs.build.outputs.is_stable == 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload build artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build.outputs.tag }}
        run: gh release upload "$TAG" dist/* --clobber
