name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      is_stable: ${{ steps.classify.outputs.is_stable }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Validate metadata
        run: twine check dist/*
      - name: Classify tag
        id: classify
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: ${{ needs.build.outputs.is_stable == 'false' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/xtb-api-python
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: ${{ needs.build.outputs.is_stable == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/xtb-api-python
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish-pypi]
    if: ${{ needs.build.outputs.is_stable == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract changelog section for this version
        id: changelog
        run: |
          # Strip leading 'v' from the tag: v0.3.0 -> 0.3.0
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section from CHANGELOG.md between "## <VERSION>" and the
          # next "## " heading. Preserves blank lines and sub-headings.
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver {found=1; next}
            found && /^## / {exit}
            found {print}
          ' CHANGELOG.md > release_notes.md
          # Fallback: if extraction produced nothing, use a minimal message
          if [ ! -s release_notes.md ]; then
            echo "Release $GITHUB_REF_NAME" > release_notes.md
          fi
          echo "Generated release notes:"
          cat release_notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            dist/*
